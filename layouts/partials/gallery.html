<div class="hh-gallery">
  <div class="hh-gallery-track" tabindex="0" aria-label="Photos from our events">
    <div class="hh-gallery-slide">
      <figure>
        <img src="/images/2026-03-workshop.jpg" alt="Participants sitting together on cushions during a workshop discussion, laughing together." width="1800" height="1200" loading="lazy">
        <figcaption>Communication skills workshop</figcaption>
      </figure>
    </div>
    <div class="hh-gallery-slide">
      <figure>
        <img src="/images/2026-10-laugh-circle.jpg" alt="Three participants laughing together in a warm embrace during open connection time." width="1800" height="1200" loading="lazy">
        <figcaption></figcaption>
      </figure>
    </div>
    <div class="hh-gallery-slide">
      <figure>
        <img src="/images/2026-23-hair.jpg" alt="One participant gently combing another's hair while they rest together." width="1800" height="1200" loading="lazy">
        <figcaption></figcaption>
      </figure>
    </div>
    <div class="hh-gallery-slide">
      <figure>
        <img src="/images/2026-14-spoon-drawer.jpg" alt="A row of participants resting peacefully together during open connection time." width="1800" height="1200" loading="lazy">
        <figcaption></figcaption>
      </figure>
    </div>
    <div class="hh-gallery-slide">
      <figure>
        <img src="/images/2026-06-mens.jpg" alt="Two participants at a men's Cuddles & Connection event holding hands quietly." width="1800" height="1199" loading="lazy">
        <figcaption></figcaption>
      </figure>
    </div>
  </div>
  <button type="button" class="hh-gallery-btn hh-gallery-prev" aria-label="Previous photo">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </button>
  <button type="button" class="hh-gallery-btn hh-gallery-next" aria-label="Next photo">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
  </button>
  <div class="hh-gallery-dots">
    <button type="button" class="hh-gallery-dot is-active" aria-label="Go to photo 1"></button>
    <button type="button" class="hh-gallery-dot" aria-label="Go to photo 2"></button>
    <button type="button" class="hh-gallery-dot" aria-label="Go to photo 3"></button>
    <button type="button" class="hh-gallery-dot" aria-label="Go to photo 4"></button>
    <button type="button" class="hh-gallery-dot" aria-label="Go to photo 5"></button>
  </div>
</div>
<script>
(function () {
  document.querySelectorAll(".hh-gallery").forEach(function (gallery) {
    var track = gallery.querySelector(".hh-gallery-track");
    var slides = gallery.querySelectorAll(".hh-gallery-slide");
    var dots = gallery.querySelectorAll(".hh-gallery-dot");
    var prev = gallery.querySelector(".hh-gallery-prev");
    var next = gallery.querySelector(".hh-gallery-next");

    function currentIndex() {
      var i = 0;
      var closest = Infinity;
      slides.forEach(function (slide, idx) {
        var dist = Math.abs(slide.offsetLeft - track.scrollLeft);
        if (dist < closest) {
          closest = dist;
          i = idx;
        }
      });
      return i;
    }

    function goTo(index) {
      index = Math.max(0, Math.min(slides.length - 1, index));
      track.scrollTo({ left: slides[index].offsetLeft, behavior: "smooth" });
    }

    function updateDots() {
      var i = currentIndex();
      dots.forEach(function (dot, idx) {
        dot.classList.toggle("is-active", idx === i);
      });
    }

    prev.addEventListener("click", function () {
      goTo(currentIndex() - 1);
    });
    next.addEventListener("click", function () {
      goTo(currentIndex() + 1);
    });
    dots.forEach(function (dot, idx) {
      dot.addEventListener("click", function () {
        goTo(idx);
      });
    });
    track.addEventListener("scroll", function () {
      window.clearTimeout(track._hhScrollTimer);
      track._hhScrollTimer = window.setTimeout(updateDots, 100);
    });
  });
})();
</script>
